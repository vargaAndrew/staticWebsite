<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><!-- Font Awesome -->
</head>
<body>
    <!-- Navbar section-->
    <!--Its a navbar container-->
    <nav class="navbar">
        <div class="navbar__container">
            <!--here is the logo, ideally should use image, but now its a String-->
            <!-- write a for tag and after that # and the id name and push tab, it will automaticall generate it (a#navbar__logo)-->
            <a href="/" id="navbar__logo">
                <i class="fa-regular fa-gem"></i>NEXT</a> <!--i tag contains the fontawesome icon-->
            <!--.navbar__toggle#mobile-menu-->
            <div class="navbar__toggle" id="mobile-menu">
                <!--shift + alt + down arrow copy the line-->
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="/" class="navbar__links">
                    Home
                    </a>
                </li>
                <li class="navbar__item">
                    <a href="/tech.html" class="navbar__links">
                    Tech
                    </a>
                </li>
                <li class="navbar__item">
                    <a href="/" class="navbar__links">
                    Products
                    </a>
                </li>
                <li class="navbar__btn">
                    <a href="/" class="button">
                    Sign Up
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hero section -->
    <!-- A hero section is the large, prominent area at the top of a website’s homepage. 
    It usually includes a headline, a short description, and a call-to-action button. 
    The hero section is designed to grab visitors’ attention and quickly communicate the main message or value of the site.
    It often features a background image, video, or graphic.-->
    <div class="main">
        <div class="main__container">
            <div class="main__content">
                <h1>NEXT GENERATION</h1>
                <h2>TECHNOLOGY</h2>
                <p>See what makes us different.</p>
                <button class="main__btn">
                    <a href="/">Get Started</a>
                </button>
            </div>
            <div class="main__img--container">
                <img src="images/pic1.svg" alt="pic" id="main__img"><!-- alt means alternative name of the picture. It will show if the image cannot be displayed -->
                <!-- pictures from https://undraw.co/--> <!-- you can add your collor at the side so the pictures will be alligned to it. Our color code is #FA6771-->
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
